name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-14 cmake libsqlite3-dev valgrind

      - name: Set compiler
        run: echo "CC=gcc-14" >> $GITHUB_ENV

      - name: Configure (all modules)
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Install
        run: cmake --install build --prefix /tmp/cdf-install

      - name: Verify install
        run: |
          test -f /tmp/cdf-install/lib/libcdf.a
          test -d /tmp/cdf-install/include/cdf/core
          echo "Install OK"

      - name: Build and test (core only, no install)
        run: |
          rm -rf build
          cmake -S . -B build \
            -DCDF_BUILD_JSON=OFF \
            -DCDF_BUILD_HTTP=OFF \
            -DCDF_BUILD_LOG=OFF \
            -DCDF_BUILD_DB=OFF \
            -DCDF_BUILD_EXAMPLES=OFF
          cmake --build build -j$(nproc)
          ctest --test-dir build --output-on-failure

      - name: Valgrind
        run: |
          rm -rf build
          cmake -S . -B build
          cmake --build build -j$(nproc)
          ctest --test-dir build -T memcheck --output-on-failure || true
